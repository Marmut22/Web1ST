<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FARIL9A | MTsN 1 CIMAHI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050508; color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        header { padding: 40px 20px; text-align: center; background: linear-gradient(to bottom, #0a0a15, transparent); }
        .title { font-family: 'Orbitron'; font-size: clamp(2.5rem, 8vw, 4.5rem); color: #00f2ff; letter-spacing: 5px; text-shadow: 0 0 15px rgba(0,242,255,0.7); }
        .main-content { flex: 1; padding: 20px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .card { background: #11111b; border: 1px solid #222; padding: 25px; border-radius: 12px; cursor: pointer; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #00f2ff; background: #161625; transform: translateY(-5px); }
        .card i { font-size: 2rem; color: #00f2ff; margin-bottom: 10px; display: block; }
        .card h3 { font-family: 'Orbitron'; font-size: 0.9rem; letter-spacing: 1px; }
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 9999; padding: 20px; }
        .modal-box { background: #0d0d12; border: 2px solid #00f2ff; width: 100%; max-width: 500px; padding: 30px; border-radius: 15px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 30px; color: #00f2ff; cursor: pointer; border:none; background:none; }
        footer { padding: 30px; background: #0a0a0f; border-top: 2px solid #00f2ff; text-align: center; margin-top: 40px; }
        .footer-text { font-family: 'Orbitron'; font-size: 1.1rem; color: #00f2ff; }
        .sub-footer { font-size: 0.9rem; opacity: 0.7; margin-top: 5px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #00f2ff; color: white; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #00f2ff; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 5px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <h1 class="title">FARIL9A</h1>
        <p style="letter-spacing: 3px; font-size: 0.8rem;">CORE LEARNING INTERFACE</p>
    </header>

    <div class="main-content">
        <div class="grid">
            <div class="card" onclick="openTool('math')"><i class="fas fa-calculator"></i><h3>MATEMATIKA</h3></div>
            <div class="card" onclick="openTool('ipa')"><i class="fas fa-flask"></i><h3>IPA</h3></div>
            <div class="card" onclick="openTool('indo')"><i class="fas fa-book"></i><h3>B. INDONESIA</h3></div>
            <div class="card" onclick="openTool('eng')"><i class="fas fa-language"></i><h3>B. INGGRIS</h3></div>
            <div class="card" onclick="openTool('ips')"><i class="fas fa-globe"></i><h3>IPS</h3></div>
            <div class="card" onclick="openTool('pai')"><i class="fas fa-mosque"></i><h3>PAI</h3></div>
            <div class="card" onclick="openTool('pkn')"><i class="fas fa-shield-halved"></i><h3>PKN</h3></div>
            <div class="card" onclick="openTool('pjok')"><i class="fas fa-running"></i><h3>PJOK</h3></div>
            <div class="card" onclick="openTool('seni')"><i class="fas fa-palette"></i><h3>SENI BUDAYA</h3></div>
            <div class="card" onclick="openTool('prakarya')"><i class="fas fa-hammer"></i><h3>PRAKARYA</h3></div>
            <div class="card" onclick="openTool('ict')"><i class="fas fa-code"></i><h3>INFORMATIKA</h3></div>
            <div class="card" onclick="openTool('arab')"><i class="fas fa-book-quran"></i><h3>B. ARAB</h3></div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-box">
            <button class="close-btn" onclick="closeM()">×</button>
            <h2 id="m-title" style="color:#00f2ff; font-family:'Orbitron'"></h2>
            <div id="m-content" style="margin-top:15px;"></div>
            <div id="m-result" style="margin-top:15px; color:#00f2ff; font-weight:bold; word-break: break-all;"></div>
        </div>
    </div>

    <footer>
        <p class="footer-text">FARIL 9A</p>
        <p class="sub-footer">MTsN 1 CIMAHI | SEDANG BELAJAR CODING</p>
    </footer>

    <script>
        const studyData = {
            math: { t: "MATEMATIKA", d: "Kalkulator Luas Persegi.", html: '<input type="number" id="v1" placeholder="Sisi (cm)"><button onclick="runMath()">HITUNG</button>' },
            ipa: { t: "IPA", d: "Konversi Suhu Celsius ke Kelvin.", html: '<input type="number" id="v1" placeholder="Derajat Celsius"><button onclick="runIpa()">KONVERSI</button>' },
            ict: { t: "INFORMATIKA", d: "Text to Binary Converter.", html: '<input type="text" id="v1" placeholder="Ketik kata..."><button onclick="runIct()">GENERATE BINARY</button>' },
            ips: { t: "IPS", d: "Data Benua di Dunia.", html: '<button onclick="setRes(\'Asia, Afrika, Amerika Utara, Amerika Selatan, Antartika, Eropa, Australia\')">TAMPILKAN DAFTAR BENUA</button>' },
            pai: { t: "PAI", d: "Rukun Islam.", html: '<button onclick="setRes(\'1. Syahadat, 2. Shalat, 3. Zakat, 4. Puasa, 5. Haji (bagi yang mampu)\')">TAMPILKAN RUKUN ISLAM</button>' },
            eng: { t: "B. INGGRIS", d: "Simple Present Tense Example.", html: '<button onclick="setRes(\'Example: I study coding every day at MTsN 1 Cimahi.\')">SHOW EXAMPLE</button>' },
            indo: { t: "B. INDONESIA", d: "Cek Huruf Kapital (Awal Kalimat).", html: '<input type="text" id="v1" placeholder="Tulis kalimat..."><button onclick="runIndo()">PERBAIKI KALIMAT</button>' },
            pkn: { t: "PKN", d: "Nilai Pancasila.", html: '<button onclick="setRes(\'1. Ketuhanan, 2. Kemanusiaan, 3. Persatuan, 4. Kerakyatan, 5. Keadilan\')">SHOW PANCASILA</button>' },
            pjok: { t: "PJOK", d: "Kalkulator BMI Sederhana.", html: '<input type="number" id="v1" placeholder="Berat (kg)"><input type="number" id="v2" placeholder="Tinggi (m, contoh 1.6)"><button onclick="runPjok()">HITUNG BMI</button>' },
            seni: { t: "SENI BUDAYA", d: "Warna Primer.", html: '<button onclick="setRes(\'Merah, Kuning, Biru\')">TAMPILKAN WARNA PRIMER</button>' },
            prakarya: { t: "PRAKARYA", d: "Tahapan Wirausaha.", html: '<button onclick="setRes(\'1. Perencanaan, 2. Produksi, 3. Pemasaran, 4. Evaluasi\')">TAMPILKAN TAHAPAN</button>' },
            arab: { t: "B. ARAB", d: "Angka 1-5.", html: '<button onclick="setRes(\'Wahid (1), Itsnan (2), Tsalatsah (3), Arbaah (4), Khamsah (5)\')">TAMPILKAN ANGKA</button>' }
        };

        function openTool(key) {
            const data = studyData[key];
            document.getElementById('m-title').innerText = data.t;
            document.getElementById('m-content').innerHTML = `<p style="margin-bottom:10px; opacity:0.8">${data.d}</p>` + data.html;
            document.getElementById('m-result').innerText = "";
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeM() { document.getElementById('modal-overlay').style.display = 'none'; }
        function setRes(txt) { document.getElementById('m-result').innerText = txt; }

        // LOGIKA SETIAP TOMBOL
        window.runMath = () => { let v = document.getElementById('v1').value; setRes("Luas: " + (v*v) + " cm²"); };
        window.runIpa = () => { let v = document.getElementById('v1').value; setRes("Hasil: " + (parseFloat(v) + 273) + " K"); };
        window.runIct = () => { let v = document.getElementById('v1').value; let b = v.split('').map(c => c.charCodeAt(0).toString(2)).join(' '); setRes("Binary: " + b); };
        window.runIndo = () => { let v = document.getElementById('v1').value; setRes("Hasil: " + v.charAt(0).toUpperCase() + v.slice(1)); };
        window.runPjok = () => { 
            let w = document.getElementById('v1').value; let h = document.getElementById('v2').value;
            let bmi = (w / (h * h)).toFixed(1); setRes("BMI: " + bmi + " (Ideal: 18.5 - 25)"); 
        };
    </script>

    <div id="prank-container" style="position: fixed; bottom: 100px; right: 40px; z-index: 10001;">
        <a href="https://pranx.com/hacker/" target="_blank" style="text-decoration: none;">
            <div style="
                background: #ff0055;
                color: white;
                padding: 12px 20px;
                border-radius: 50px;
                font-family: 'Orbitron', sans-serif;
                font-size: 0.7rem;
                font-weight: bold;
                border: 2px solid white;
                box-shadow: 0 0 20px rgba(255, 0, 85, 0.8);
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                animation: pulse-glow 1.5s infinite;
            ">
                <i class="fas fa-triangle-exclamation" style="font-size: 1.2rem;"></i>
                <div style="display: flex; flex-direction: column;">
                    <span>CRITICAL ERROR</span>
                    <span style="font-size: 0.5rem; opacity: 0.8;">FIX SYSTEM NOW</span>
                </div>
            </div>
        </a>
    </div>

    <style>
        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 0, 85, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 0, 85, 1); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 0, 85, 0.5); }
        }
    </style>

</body>
</html>
